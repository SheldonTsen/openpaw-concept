services:
  worker:
    develop:
      watch:
        - action: sync+restart
          path: ./src/openpaw
          target: /app/src/openpaw
        - action: rebuild
          path: ./pyproject.toml
        - action: rebuild
          path: ./Dockerfile

  whatsapp-listener:
    develop:
      watch:
        - action: sync+restart
          path: ./src/openpaw
          target: /app/src/openpaw
        - action: rebuild
          path: ./pyproject.toml
        - action: rebuild
          path: ./Dockerfile
